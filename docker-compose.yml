  api-gateway:
    build:
      context: .
      dockerfile: infrastructure/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - furnicraft_network
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s
    restart: unless-stopped

networks:
  furnicraft_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: