databaseChangeLog:
  - changeSet:
      id: 02-create-categories
      author: javid.rzayev
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addColumn:
            tableName: products
            columns:
              - column:
                  name: category_id
                  type: UUID

        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: category_id
            constraintName: product_category
            referencedTableName: categories
            referencedColumnNames: id
