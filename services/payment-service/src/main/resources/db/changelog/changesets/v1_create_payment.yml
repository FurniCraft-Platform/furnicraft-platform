databaseChangeLog:
  - changeSet:
      id: 01-create-payments-table
      author: furnicraft
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: amount
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: payment_method
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: transaction_id
                  type: VARCHAR(100)
                  constraints:
                    unique: true
                    nullable: true

              - column:
                  name: paid_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true

              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_payments_order_id
            tableName: payments
            columns:
              - column:
                  name: order_id

        - createIndex:
            indexName: idx_payments_user_id
            tableName: payments
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_payments_status
            tableName: payments
            columns:
              - column:
                  name: status