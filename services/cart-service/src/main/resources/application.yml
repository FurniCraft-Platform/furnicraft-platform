server:
  port: 8086

spring:
  application:
    name: cart-service

  datasource:
    url: jdbc:postgresql://localhost:5434/furnicraft_cart
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master-cart.yml

application:
  clients:
    product-service:
      url: http://localhost:8082
    user-service:
      url: http://localhost:8083