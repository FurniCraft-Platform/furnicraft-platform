databaseChangeLog:
  - changeSet:
      id: 02-create-cart-items-table
      author: ali.huseynov
      changes:
        - createTable:
            tableName: cart_items
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_cart_items
                    nullable: false

              - column:
                  name: cart_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: product_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: product_code
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: product_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: unit_price
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false

              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: line_total
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: cart_items
            columnNames: cart_id, product_id
            constraintName: uk_cart_items_cart_product

        - addForeignKeyConstraint:
            baseTableName: cart_items
            baseColumnNames: cart_id
            referencedTableName: carts
            referencedColumnNames: id
            constraintName: fk_cart_items_cart_id
            onDelete: CASCADE

        - createIndex:
            tableName: cart_items
            indexName: idx_cart_items_cart_id
            columns:
              - column:
                  name: cart_id

        - createIndex:
            tableName: cart_items
            indexName: idx_cart_items_product_id
            columns:
              - column:
                  name: product_id