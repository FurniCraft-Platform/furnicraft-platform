server:
  port: 8080

spring:
  application:
    name: api-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: auth-service
        url: /api/v1/auth/v3/api-docs
      - name: user-service
        url: /api/v1/users/v3/api-docs
      - name: product-service
        url: /api/v1/products/v3/api-docs
      - name: cart-service
        url: /api/v1/carts/v3/api-docs
      - name: order-service
        url: /api/v1/orders/v3/api-docs
      - name: payment-service
        url: /api/v1/payments/v3/api-docs
      - name: media-service
        url: /api/v1/media/v3/api-docs